<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
  #map { width: 100%; height: 100%; }
  #map-status {
    position: absolute;
    left: 6px;
    bottom: 6px;
    z-index: 1000;
    padding: 2px 6px;
    font: 11px/1.3 Arial, sans-serif;
    color: #fff;
    background: rgba(0,0,0,0.55);
    border-radius: 3px;
    display: none;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="map"></div>
<div id="map-status"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function() {
  'use strict';

  var map = L.map('map', {
    attributionControl: true,
    zoomControl: false
  }).setView([10.7719, 106.6982], 16);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap',
    maxZoom: 19
  }).addTo(map);

  var marker = L.circleMarker([10.7719, 106.6982], {
    radius: 6,
    color: '#fff',
    weight: 2,
    fillColor: '#dc2626',
    fillOpacity: 1,
    interactive: false
  }).addTo(map);

  var statusEl = document.getElementById('map-status');
  map.on('tileerror', function() {
    statusEl.textContent = 'Tile map load error';
    statusEl.style.display = 'block';
  });

  window.addEventListener('message', function(ev) {
    var d = ev.data;
    if (!d || typeof d.type !== 'string') {
      return;
    }
    if (d.type === 'minimap:set' && typeof d.lat === 'number' && typeof d.lng === 'number') {
      var zoom = typeof d.zoom === 'number' ? d.zoom : map.getZoom();
      marker.setLatLng([d.lat, d.lng]);
      map.invalidateSize(false);
      map.setView([d.lat, d.lng], zoom, { animate: false });
    } else if (d.type === 'minimap:invalidate') {
      map.invalidateSize(false);
    }
  });
})();
</script>
</body>
</html>
